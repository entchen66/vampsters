<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Moonlight Peaks - Vampster Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Berkshire+Swash&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>

<!-- Magische Hintergrund-Partikel -->
<div class="magic-bg-particles" id="magic-bg-particles"></div>

<div class="header-container">
    <h1 id="page-title">🦇 Moonlight Peaks - Vampster Tracker</h1>
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-de" onclick="setLanguage('de')">🇩🇪 DE</button>
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">🇬🇧 EN</button>
    </div>
</div>

<div class="progress-container">
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
        <div class="progress-text-overlay">
            <span id="progress-text">0 / 0</span>&nbsp;<span id="progress-label">GESAMMELT</span>
        </div>
    </div>
</div>



<div class="main-content" id="tracker-container"></div>

<!-- Modal schließt sich nun bei Klick *irgendwo*, auch direkt auf das Bild -->
<div id="image-modal" class="modal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img alt="Zoomed Screenshot" class="modal-content" id="modal-img">
</div>

<div id="cursor-container">
    <!-- Der Kristall -->
    <svg class="magic-crystal" id="crystal" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M 28 16 L 14 8 L 6 16 L 14 24 Z" fill="#B066FE" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M 24 16 L 12 11 L 8 16 L 12 21 Z" fill="#FFD700" opacity="0.8"/>
    </svg>

    <!-- Die Fledermaus -->
    <div class="bat-container" id="bat">
        <svg class="flying-bat" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            
            <!-- Linker Flügel -->
            <g transform="translate(12, 18)">
                <g id="left-wing" style="transform-origin: 0 0; will-change: transform;">
                    <path d="M 0 0 C -8 -12, -18 -8, -22 -2 C -18 2, -12 1, -8 4 C -6 5, -3 8, 0 6 Z" fill="#2D1B4E" stroke="#B066FE" stroke-width="1" stroke-linejoin="round" />
                </g>
            </g>
            
            <!-- Rechter Flügel -->
            <g transform="translate(20, 18)">
                <g id="right-wing" style="transform-origin: 0 0; will-change: transform;">
                    <path d="M 0 0 C 8 -12, 18 -8, 22 -2 C 18 2, 12 1, 8 4 C 6 5, 3 8, 0 6 Z" fill="#2D1B4E" stroke="#B066FE" stroke-width="1" stroke-linejoin="round" />
                </g>
            </g>

            <!-- Körper & Ohren -->
            <ellipse cx="16" cy="18" rx="7" ry="8" fill="#2D1B4E" stroke="#1A0F2E" stroke-width="1.5" />
            <path d="M 12 11 L 8 4 L 14 9 Z" fill="#2D1B4E" stroke="#B066FE" stroke-width="1" stroke-linejoin="round"/>
            <path d="M 20 11 L 24 4 L 18 9 Z" fill="#2D1B4E" stroke="#B066FE" stroke-width="1" stroke-linejoin="round"/>
            
            <!-- Augen & Zähne -->
            <ellipse cx="13" cy="17" rx="1.5" ry="2.5" fill="#FFD700"><animate attributeName="ry" values="2.5; 0.2; 2.5; 2.5" keyTimes="0; 0.05; 0.1; 1" dur="4s" repeatCount="indefinite"/></ellipse>
            <ellipse cx="19" cy="17" rx="1.5" ry="2.5" fill="#FFD700"><animate attributeName="ry" values="2.5; 0.2; 2.5; 2.5" keyTimes="0; 0.05; 0.1; 1" dur="4s" repeatCount="indefinite"/></ellipse>
            <path d="M 14.5 21 L 15 23 L 15.5 21 Z" fill="#FFFFFF" />
            <path d="M 16.5 21 L 17 23 L 17.5 21 Z" fill="#FFFFFF" />
        </svg>
    </div>
</div>

<footer>
    <div>
        <span id="credits-label">Informationen & Bilder stammen teilweise von</span>
        <a href="https://www.thegamer.com/moonlight-peaks-vampsters-location-guide/" rel="noopener noreferrer" target="_blank">TheGamer</a>
    </div>
    <div id="credits-company" style="margin-top: 8px; font-size: 11px; opacity: 0.7;"></div>
</footer>

<!-- Schnellnavigation (FAB) -->
<div class="quick-nav-container" id="quick-nav">
    <button class="quick-nav-btn" id="quick-nav-btn" onclick="toggleQuickNav(arguments[0])" title="Schnellnavigation">
        <svg height="26" viewBox="0 0 24 24" width="26">
            <!-- Gothic Compass with Bat Wings -->
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#B066FE"/>
            <path d="M12 6l-2 3.5h4L12 6zm0 12l2-3.5h-4L12 18z" fill="#ff79ff"/>
            <path d="M6 12l3.5-2v4L6 12zm12 0l-3.5 2v-4L18 12z" fill="#ff79ff"/>
            <circle cx="12" cy="12" fill="#FFF" r="1.5"/>
        </svg>
    </button>
    <div class="quick-nav-menu" id="quick-nav-menu">
        <div class="quick-nav-header">
            <span id="quick-nav-title">Regionen</span>
            <span class="quick-nav-close" onclick="toggleQuickNav(arguments[0])">&times;</span>
        </div>
        <div class="quick-nav-list" id="quick-nav-list">
            <!-- Wird dynamisch befüllt -->
        </div>
    </div>
</div>

<script src="assets/hashes.js"></script>
<script src="vampsters_data.js"></script>
<script src="script.js"></script>
</body>
</html>
