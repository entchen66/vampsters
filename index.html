<head>

    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: #2d2d3f;
            --text-color: #e0e0e0;
            --accent-color: #ff4757;
            --accent-hover: #ff6b81;
            --completed-bg: #1e1e2a;
            --completed-text: #888;
            --warning-color: #ffb142;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overscroll-behavior-y: none;
        }

        /* Header und Sprachauswahl */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin: 0;
            padding: 10px;
            font-size: 28px;
        }

        .lang-switcher {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .lang-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* Fortschrittsanzeige */
        .progress-container {
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto 15px auto;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .progress-bar-bg {
            background-color: #111;
            border-radius: 10px;
            height: 16px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Info Hinweis (Work In Progress) */
        .wip-notice {
            max-width: 800px;
            width: 100%;
            margin: 0 auto 25px auto;
            background-color: rgba(255, 177, 66, 0.1);
            border-left: 4px solid var(--warning-color);
            padding: 12px 15px;
            border-radius: 0 5px 5px 0;
            color: #f1f2f6;
            font-size: 14px;
            line-height: 1.5;
            box-sizing: border-box;
        }

        /* Regionen und Grid */
        .main-content {
            flex-grow: 1;
        }

        .region-section {
            margin-bottom: 40px;
        }

        .region-title {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: inline-block;
            color: var(--accent-color);
            font-size: 22px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 15px;
        }

        /* Einzelne Karten */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, opacity 0.3s, border 0.2s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 2px solid transparent;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-5px);
                border-color: var(--accent-color);
            }
        }

        .card.completed {
            background-color: var(--completed-bg);
            opacity: 0.5;
            border-color: transparent;
        }

        .card.completed img {
            filter: grayscale(100%);
        }

        .card.completed p {
            color: var(--completed-text);
            text-decoration: line-through;
        }

        .image-container {
            position: relative;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 2px solid #111;
            display: block;
        }

        .zoom-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            z-index: 10;
        }

        .zoom-icon:hover {
            background-color: var(--accent-color);
            transform: scale(1.1);
        }

        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card p {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 15px;
            margin-top: 0;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: var(--accent-color);
            pointer-events: none;
        }

        .checkbox-container input {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            accent-color: var(--accent-color);
        }

        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            background-color: #111;
            color: #555;
            font-style: italic;
            border-bottom: 2px solid #111;
        }

        /* Modal (Lightbox) */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            overflow: hidden;
            cursor: pointer; /* Zeigt an, dass man überall klicken kann, um zu schließen */
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 4px;
            will-change: transform;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        /* Footer / Credits */
        footer {
            text-align: center;
            padding: 30px 0 10px 0;
            font-size: 13px;
            color: #888;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        /* MOBILE ANPASSUNGEN */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header-container {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 15px;
            }

            .lang-switcher {
                position: relative;
                transform: none;
                justify-content: center;
            }

            h1 {
                font-size: 24px;
            }

            .progress-container {
                padding: 10px;
                top: 5px;
            }

            .modal-content {
                max-width: 100%;
            }
        }

        /* Sparkle Particle styles */
        .sparkle-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            will-change: transform, opacity;
            mix-blend-mode: screen;
        }

        /* Card pop animation */
        @keyframes card-pop {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 20px #ff4757, 0 0 30px #b15eff;
            }
            100% {
                transform: scale(1);
            }
        }

        .pop-animation {
            animation: card-pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Custom Bat Cursor */
        #cursor-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 100000;
        }

        @media (pointer: fine) {
            * { cursor: none !important; }
            #cursor-container {
                display: block;
            }
        }

        /* GPU Beschleunigung & Zentrierung */
        .magic-crystal, .bat-container {
            position: absolute;
            top: 0; left: 0;
            will-change: transform; 
        }

        .magic-crystal {
            width: 32px;
            height: 32px;
            margin-top: -16px;
            margin-left: -28px;
            transform-origin: 28px 16px; 
            filter: drop-shadow(0 0 6px rgba(176, 102, 254, 0.9));
        }

        .bat-container {
            width: 40px;
            height: 40px;
            margin-top: -20px;
            margin-left: -20px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .flying-bat {
            width: 100%;
            height: 100%;
            animation: bobbing 2s ease-in-out infinite;
            overflow: visible; 
        }

        @keyframes bobbing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
    </style>
</head>

    let totalVampsters = 0;
    let collectedVampsters = 0;
    let currentLang = 'de';

    // --- SPRACHE & UI ---
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('vampster_lang', lang);

        document.getElementById('btn-de').classList.toggle('active', lang === 'de');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        document.title = translations[lang].title;
        document.getElementById('page-title').innerText = translations[lang].title;
        document.getElementById('progress-label').innerText = translations[lang].progress;
        document.getElementById('credits-label').innerText = translations[lang].credits;
        document.getElementById('wip-notice').innerHTML = translations[lang].wip;

        renderTracker();
    }

    // --- FORTSCHRITT ---
    function updateProgress() {
        document.getElementById('progress-text').innerText = `${collectedVampsters} / ${totalVampsters}`;
        const percentage = totalVampsters === 0 ? 0 : (collectedVampsters / totalVampsters) * 100;
        document.getElementById('progress-bar').style.width = percentage + '%';
    }

    // --- KARTEN-KLICK ---
    function handleCardClick(event, id) {
        if (event.target.tagName.toLowerCase() === 'input') {
            event.target.checked = !event.target.checked;
        }

        const card = document.getElementById(`card-${id}`);
        const checkbox = document.getElementById(`checkbox-${id}`);

        const isNowChecked = !checkbox.checked;
        checkbox.checked = isNowChecked;

        if (isNowChecked) {
            localStorage.setItem(`vampster_${id}`, 'true');
            card.classList.add('completed');
            collectedVampsters++;

            // Klick-Koordinaten ermitteln
            let x = event.clientX;
            let y = event.clientY;

            // Fallback auf die Mitte der Kachel, falls kein gültiger Klick (z.B. Tastatur-Aktivierung)
            if (!x || !y) {
                const rect = card.getBoundingClientRect();
                x = rect.left + rect.width / 2;
                y = rect.top + rect.height / 2;
            }

            // Sparkle-Effekt auslösen
            createSparkleBurst(x, y);

            // Pop-Animation auf der Kachel ausführen
            card.classList.remove('pop-animation');
            void card.offsetWidth; // Reflow triggern, um die Animation zurückzusetzen
            card.classList.add('pop-animation');
            card.addEventListener('animationend', () => {
                card.classList.remove('pop-animation');
            }, { once: true });
        } else {
            localStorage.removeItem(`vampster_${id}`);
            card.classList.remove('completed');
            collectedVampsters--;
        }

        updateProgress();
    }

    // --- SPARKLE EFFEKT (Vampir-Theme) ---
    function createSparkleBurst(x, y) {
        const particleCount = 35; // Mehr Partikel für ein sattes, magisches Gefühl
        
        // Magische Symbole (Sterne und Orbs)
        const shapes = [
            // 4-zackiger gotischer Funkelstern
            `M12 0 C12 8 16 12 24 12 C16 12 12 16 12 24 C12 16 8 12 0 12 C8 12 12 8 12 0 Z`,
            // Klassischer spitzer Stern
            `M12 0 L15 9 L24 12 L15 15 L12 24 L9 15 L0 12 L9 9 Z`,
            // Kreis/Orb (wird als SVG-Kreis gerendert)
            `circle`
        ];

        // Farbschema: Lila, Rötlich und Pink (ausschließlich!)
        const colors = [
            '#ff4757', // Rötlich (Akzent)
            '#ff2e44', // Kräftiges Rot
            '#ff7675', // Helles Rot/Rosa
            '#ff79ff', // Hellpink
            '#ff6b81', // Pink
            '#f368e0', // Magisches Pink
            '#b15eff', // Neon-Lila
            '#a55eea', // Violett
            '#be2edd'  // Dunkles Magisches Lila
        ];

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'sparkle-particle';

            // Unterschiedliche Größen für räumliche Tiefe
            const size = Math.random() * 10 + 8; // 8px bis 18px
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // Intensiver doppelter Leuchteffekt für den magischen Glow
            particle.style.filter = `drop-shadow(0 0 3px ${color}) drop-shadow(0 0 8px ${color})`;
            particle.style.opacity = '0.95';

            const shapeIndex = Math.floor(Math.random() * shapes.length);
            const shape = shapes[shapeIndex];

            if (shape === 'circle') {
                particle.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><circle cx="12" cy="12" r="8" fill="${color}" /></svg>`;
            } else {
                particle.innerHTML = `<svg viewBox="0 0 24 24" width="100%" height="100%"><path fill="${color}" d="${shape}" /></svg>`;
            }

            // Startpunkt am Klick-Ort zentrieren
            particle.style.left = `${x - size / 2}px`;
            particle.style.top = `${y - size / 2}px`;

            // Physik für kreisförmige Ausbreitung (360 Grad) um den Klickpunkt
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 90 + 40; // Flugdistanz kreisförmig nach außen (40px bis 130px)
            
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            const rotate = Math.random() * 270 + 90; // Rotation

            document.body.appendChild(particle);

            // Shimmer und Ausbreitung im Kreis
            particle.animate([
                {
                    transform: 'translate(0, 0) scale(0) rotate(0deg)',
                    opacity: 0
                },
                {
                    transform: `translate(${tx * 0.3}px, ${ty * 0.3}px) scale(1.3) rotate(${rotate * 0.3}deg)`,
                    opacity: 0.95,
                    offset: 0.2
                },
                {
                    transform: `translate(${tx * 0.7}px, ${ty * 0.7}px) scale(0.9) rotate(${rotate * 0.65}deg)`,
                    opacity: 0.8,
                    offset: 0.6
                },
                {
                    transform: `translate(${tx}px, ${ty}px) scale(0) rotate(${rotate}deg)`,
                    opacity: 0
                }
            ], {
                duration: Math.random() * 800 + 1300, // Längere Sichtbarkeit (1300ms bis 2100ms)
                easing: 'cubic-bezier(0.16, 1, 0.3, 1)', // Weicher Verlauf
                fill: 'forwards'
            }).onfinish = () => {
                particle.remove();
            };
        }
    }

    // --- RENDER GRID ---
    function renderTracker() {
        const container = document.getElementById('tracker-container');
        container.innerHTML = '';

        totalVampsters = 0;
        collectedVampsters = 0;

        const uiStrings = translations[currentLang];

        for (const [region, vampsters] of Object.entries(vampstersData)) {
            const section = document.createElement('div');
            section.className = 'region-section';

            const title = document.createElement('h2');
            title.className = 'region-title';
            title.innerText = uiStrings.regions[region] || region;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid';

            vampsters.forEach((vampster) => {
                totalVampsters++;

                const uniqueId = vampster.id;
                const isCollected = localStorage.getItem(`vampster_${uniqueId}`) === 'true';

                if (isCollected) {
                    collectedVampsters++;
                }

                const imageHtml = vampster.image_url
                    ? `<div class="image-container">
                               <img src="${vampster.image_url}" alt="Vampster" loading="lazy">
                               <div class="zoom-icon" onclick="openModal('${vampster.image_url}', event)" title="${uiStrings.zoom}">🔍</div>
                           </div>`
                    : `<div class="no-image">${uiStrings.noImage}</div>`;

                const description = vampster.desc[currentLang];

                const cardHtml = `
                        <div class="card ${isCollected ? 'completed' : ''}" id="card-${uniqueId}" onclick="handleCardClick(event, '${uniqueId}')">
                            ${imageHtml}
                            <div class="card-content">
                                <p>${description}</p>
                                <label class="checkbox-container">
                                    <input type="checkbox" id="checkbox-${uniqueId}" ${isCollected ? 'checked' : ''}>
                                    ${uiStrings.collected}
                                </label>
                            </div>
                        </div>
                    `;

                grid.insertAdjacentHTML('beforeend', cardHtml);
            });

            section.appendChild(grid);
            container.appendChild(section);
        }

        updateProgress();
    }

    // --- CUSTOM PINCH TO ZOOM & PAN FÜR DAS MODAL BILD ---
    const modal = document.getElementById('image-modal');
    const modalImg = document.getElementById('modal-img');

    let scale = 1;
    let pointX = 0, pointY = 0;
    let startX = 0, startY = 0;
    let startDistance = 0;
    let isPinching = false;
    let isPanning = false;

    function openModal(imgSrc, event) {
        event.stopPropagation();
        modalImg.src = imgSrc;
        modal.classList.add('show');

        // Reset Zoom/Pan Werte
        scale = 1;
        pointX = 0;
        pointY = 0;
        modalImg.style.transform = `translate(0px, 0px) scale(1)`;
    }

    function closeModal() {
        modal.classList.remove('show');
    }

    // Touch-Start
    modalImg.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            isPinching = true;
            isPanning = false;
            startDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
        } else if (e.touches.length === 1 && scale > 1) {
            isPanning = true;
            isPinching = false;
            startX = e.touches[0].clientX - pointX;
            startY = e.touches[0].clientY - pointY;
        }
    });

    // Touch-Move (Zoom & Wischen)
    modalImg.addEventListener('touchmove', (e) => {
        if (isPinching && e.touches.length === 2) {
            e.preventDefault();
            let currentDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );

            let distanceDiff = currentDistance - startDistance;
            scale += distanceDiff * 0.01;

            scale = Math.min(Math.max(1, scale), 4);
            startDistance = currentDistance;

            if (scale === 1) {
                pointX = 0;
                pointY = 0;
            }

            modalImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;

        } else if (isPanning && e.touches.length === 1) {
            e.preventDefault();
            pointX = e.touches[0].clientX - startX;
            pointY = e.touches[0].clientY - startY;
            modalImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        }
    }, {passive: false});

    // Touch-End
    modalImg.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) isPinching = false;
        if (e.touches.length === 0) isPanning = false;

        if (scale < 1) {
            scale = 1;
            pointX = 0;
            pointY = 0;
            modalImg.style.transform = `translate(0px, 0px) scale(1)`;
        }
    });

    // --- INIT BEIM START ---
    window.onload = function () {
        let savedLang = localStorage.getItem('vampster_lang');
        if (!savedLang) {
            const browserLang = navigator.language.slice(0, 2);
            savedLang = (browserLang === 'de') ? 'de' : 'en';
        }
        setLanguage(savedLang);
    };

    // --- CUSTOM BAT CURSOR ANIMATION ---
    if (window.matchMedia('(pointer: fine)').matches) {
        const crystal = document.getElementById('crystal');
        const bat = document.getElementById('bat');
        const leftWingAnim = document.getElementById('left-wing-anim');
        const rightWingAnim = document.getElementById('right-wing-anim');
        
        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        let cPos = { x: mouse.x, y: mouse.y, angle: 0 }; 
        let bPos = { x: mouse.x, y: mouse.y, scaleX: 1 }; 
        let mouseOnScreen = true;

        const lerp = (start, end, factor) => start + (end - start) * factor;

        window.addEventListener('mousemove', (e) => {
            // Ignoriere Events ganz am Bildschirmrand beim Verlassen
            if (e.clientX < 3 || e.clientY < 3 || e.clientX > window.innerWidth - 3 || e.clientY > window.innerHeight - 3) {
                mouseOnScreen = false;
                return;
            }
            mouseOnScreen = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        document.addEventListener('mouseleave', () => {
            mouseOnScreen = false;
        });

        document.addEventListener('mouseenter', (e) => {
            mouseOnScreen = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function animateCursor() {
            const oldCX = cPos.x;
            const oldCY = cPos.y;
            const oldBX = bPos.x;
            const oldBY = bPos.y;

            // Ziel-Position bestimmen (Maus oder Ruheposition)
            let targetX = mouse.x;
            let targetY = mouse.y;

            if (!mouseOnScreen) {
                // Ruheposition: Direkt rechts neben der Fortschritts-Anzeige
                const progressText = document.getElementById('progress-text');
                if (progressText) {
                    const rect = progressText.getBoundingClientRect();
                    targetX = rect.right + 25; // Platziert den Kristall rechts neben die Zahlen
                    targetY = rect.top + rect.height / 2;
                } else {
                    // Fallback (z.B. oben rechts)
                    targetX = window.innerWidth - 80;
                    targetY = 60;
                }
            }

            // Weicheres Hingleiten zur Ruheposition
            const lerpFactor = mouseOnScreen ? 0.35 : 0.05;
            cPos.x = lerp(cPos.x, targetX, lerpFactor);
            cPos.y = lerp(cPos.y, targetY, lerpFactor);

            const vx = cPos.x - oldCX;
            const vy = cPos.y - oldCY;
            const speed = Math.sqrt(vx * vx + vy * vy);

            if (speed > 0.5) {
                let targetAngle = Math.atan2(vy, vx);
                let deltaAngle = targetAngle - cPos.angle;
                while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                cPos.angle += deltaAngle * 0.3;
            }

            crystal.style.transform = `translate3d(${cPos.x}px, ${cPos.y}px, 0) rotate(${cPos.angle}rad)`;

            const targetDistance = Math.min(40 + speed * 2, 120);
            const targetBatX = cPos.x - Math.cos(cPos.angle) * targetDistance;
            const targetBatY = cPos.y - Math.sin(cPos.angle) * targetDistance;

            bPos.x = lerp(bPos.x, targetBatX, 0.1);
            bPos.y = lerp(bPos.y, targetBatY, 0.1);

            if (Math.abs(Math.cos(cPos.angle)) > 0.1) {
                bPos.scaleX = Math.cos(cPos.angle) > 0 ? 1 : -1;
            }

            bat.style.transform = `translate3d(${bPos.x}px, ${bPos.y}px, 0) scaleX(${bPos.scaleX})`;

            // Flattern-Geschwindigkeit der Flügel dynamisch steuern
            const batVx = bPos.x - oldBX;
            const batVy = bPos.y - oldBY;
            const batSpeed = Math.sqrt(batVx * batVx + batVy * batVy);

            let newDur = "0.8s"; // Langsames Flattern im Stand
            if (batSpeed > 0.3) {
                newDur = "0.15s"; // Schnelles Flattern bei Bewegung
            }

            // Nur updaten, wenn sich der Wert geändert hat, um Render-Ruckler zu vermeiden
            if (leftWingAnim && rightWingAnim && leftWingAnim.getAttribute('dur') !== newDur) {
                leftWingAnim.setAttribute('dur', newDur);
                rightWingAnim.setAttribute('dur', newDur);
            }

            requestAnimationFrame(animateCursor);
        }

        animateCursor();
    }
</script>
</body>
</html>
