    <title>Moonlight Peaks - Vampster Tracker</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --card-bg: #2d2d3f;
            --text-color: #e0e0e0;
            --accent-color: #ff4757;
            --accent-hover: #ff6b81;
            --completed-bg: #1e1e2a;
            --completed-text: #888;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header und Sprachauswahl */
        .header-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        h1 {
            color: var(--accent-color);
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        .lang-switcher {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .lang-switcher {
                position: static;
                transform: none;
                margin-top: 15px;
                width: 100%;
                justify-content: center;
            }
        }

        .lang-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        /* Fortschrittsanzeige */
        .progress-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto 30px auto;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .progress-bar-bg {
            background-color: #111;
            border-radius: 10px;
            height: 20px;
            width: 100%;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Regionen und Grid */
        .main-content {
            flex-grow: 1;
        }

        .region-section {
            margin-bottom: 50px;
        }

        .region-title {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: inline-block;
            color: var(--accent-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Einzelne Karten */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s, opacity 0.3s, border 0.2s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .card.completed {
            background-color: var(--completed-bg);
            opacity: 0.5;
            border-color: transparent;
        }

        .card.completed img {
            filter: grayscale(100%);
        }

        .card.completed p {
            color: var(--completed-text);
            text-decoration: line-through;
        }

        .image-container {
            position: relative;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid #111;
            display: block;
        }

        .zoom-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            z-index: 10;
        }

        .zoom-icon:hover {
            background-color: var(--accent-color);
            transform: scale(1.1);
        }

        .card-content {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card p {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: var(--accent-color);
            pointer-events: none;
        }

        .checkbox-container input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            accent-color: var(--accent-color);
        }

        .no-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 160px;
            background-color: #111;
            color: #555;
            font-style: italic;
            border-bottom: 2px solid #111;
        }

        /* Modal (Lightbox) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border: 2px solid var(--accent-color);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: var(--accent-color);
        }

        /* Footer / Credits */
        footer {
            text-align: center;
            padding: 30px 0 10px 0;
            font-size: 13px;
            color: #888;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
    </style>
</head>

                { "id": "vamp_kt_01", "desc": { "de": "Rechts vom Tempel.", "en": "To the right of the temple" }, "image_url": "https://static0.thegamerimages.com/wordpress/wp-content/uploads/wm/2026/07/moonlight-peaks-05_07_2026-10_33_12.png" },
                { "id": "vamp_kt_02", "desc": { "de": "Links vom Tempel.", "en": "To the left of the temple" }, "image_url": "https://static0.thegamerimages.com/wordpress/wp-content/uploads/wm/2026/07/moonlight-peaks-05_07_2026-10_32_39.png" }
            ]
        };

        let totalVampsters = 0;
        let collectedVampsters = 0;
        let currentLang = 'de';

        // Setzt die Sprache, speichert sie und lädt die Oberfläche neu
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('vampster_lang', lang);
            
            document.getElementById('btn-de').classList.toggle('active', lang === 'de');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');

            document.title = translations[lang].title;
            document.getElementById('page-title').innerText = translations[lang].title;
            document.getElementById('progress-label').innerText = translations[lang].progress;
            document.getElementById('credits-label').innerText = translations[lang].credits;

            renderTracker();
        }

        // Modal Funktionen
        function openModal(imgSrc, event) {
            event.stopPropagation();
            const modal = document.getElementById('image-modal');
            document.getElementById('modal-img').src = imgSrc;
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.remove('show');
        }

        // Fortschrittsbalken aktualisieren
        function updateProgress() {
            document.getElementById('progress-text').innerText = `${collectedVampsters} / ${totalVampsters}`;
            const percentage = totalVampsters === 0 ? 0 : (collectedVampsters / totalVampsters) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
        }

        // Klick auf Kachel verarbeiten
        function handleCardClick(event, id) {
            if (event.target.tagName.toLowerCase() === 'input') {
                event.target.checked = !event.target.checked;
            }

            const card = document.getElementById(`card-${id}`);
            const checkbox = document.getElementById(`checkbox-${id}`);
            
            const isNowChecked = !checkbox.checked;
            checkbox.checked = isNowChecked;

            if (isNowChecked) {
                // Sichert die ID im lokalen Speicher deines Browsers
                localStorage.setItem(`vampster_${id}`, 'true');
                card.classList.add('completed');
                collectedVampsters++;
            } else {
                localStorage.removeItem(`vampster_${id}`);
                card.classList.remove('completed');
                collectedVampsters--;
            }
            
            updateProgress();
        }

        // Baut das Grid auf (wird beim Laden und beim Sprachwechsel aufgerufen)
        function renderTracker() {
            const container = document.getElementById('tracker-container');
            container.innerHTML = ''; 
            
            totalVampsters = 0;
            collectedVampsters = 0;
            
            const uiStrings = translations[currentLang];

            for (const [region, vampsters] of Object.entries(vampstersData)) {
                const section = document.createElement('div');
                section.className = 'region-section';
                
                const title = document.createElement('h2');
                title.className = 'region-title';
                title.innerText = region; 
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'grid';

                vampsters.forEach((vampster) => {
                    totalVampsters++;
                    
                    // Verwendet nun die feste ID aus dem JSON!
                    const uniqueId = vampster.id;
                    const isCollected = localStorage.getItem(`vampster_${uniqueId}`) === 'true';
                    
                    if (isCollected) {
                        collectedVampsters++;
                    }

                    const imageHtml = vampster.image_url 
                        ? `<div class="image-container">
                               <img src="${vampster.image_url}" alt="Vampster" loading="lazy">
                               <div class="zoom-icon" onclick="openModal('${vampster.image_url}', event)" title="${uiStrings.zoom}">🔍</div>
                           </div>` 
                        : `<div class="no-image">${uiStrings.noImage}</div>`;

                    const description = vampster.desc[currentLang];

                    const cardHtml = `
                        <div class="card ${isCollected ? 'completed' : ''}" id="card-${uniqueId}" onclick="handleCardClick(event, '${uniqueId}')">
                            ${imageHtml}
                            <div class="card-content">
                                <p>${description}</p>
                                <label class="checkbox-container">
                                    <input type="checkbox" id="checkbox-${uniqueId}" ${isCollected ? 'checked' : ''}>
                                    ${uiStrings.collected}
                                </label>
                            </div>
                        </div>
                    `;
                    
                    grid.insertAdjacentHTML('beforeend', cardHtml);
                });

                section.appendChild(grid);
                container.appendChild(section);
            }

            updateProgress();
        }

        // Init beim Start
        window.onload = function() {
            const savedLang = localStorage.getItem('vampster_lang') || 'de';
            setLanguage(savedLang);
        };
    </script>
</body>
